{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Delete Event | TopEventNite</title>
</head>
<body>

<h1>Delete Event</h1>

<p>Are you sure you want to delete "<strong>{{ event.title }}</strong>"?</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
</form>

<p><a href="{% url 'event_detail' event.id %}">Cancel</a></p>

</body>
</html>
