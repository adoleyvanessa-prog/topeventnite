{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TopEventNite{% endblock %}</title>

    <link rel="icon" type="image/svg+xml" href="{% static 'events/images/ticket.svg' %}">
    <link rel="icon" type="image/png" href="{% static 'events/images/ticket.png' %}">

    <!-- Google font used across the site -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <!-- Font Awesome icons -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    >

    <!-- Global site styling -->
    <link rel="stylesheet" href="{% static 'events/css/base.css' %}">

    <!-- Extra page-specific CSS gets inserted here -->
    {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">

    <!-- Shared navigation -->
    {% include 'events/includes/navbar.html' %}

    <!-- Main page content -->
    {% block content %}{% endblock %}

    <!-- Shared footer -->
    {% include 'events/includes/footer.html' %}

</body>
</html>
