{% extends 'events/base.html' %}
{% load static %}

{% block title %}{{ event.title }} | TopEventNite{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'events/css/event_detail.css' %}">
{% endblock %}

{% block body_class %}event-detail-page{% endblock %}

{% block content %}
<div class="site-shell event-detail-shell">
    <main class="event-detail-main">
        <div class="section-title-pill">Event Details</div>

        <section class="event-detail-card">
            <h1 class="event-title">{{ event.title }}</h1>
            <p>{{ event.description }}</p>
        </section>
    </main>
</div>
{% endblock %}
