<header class="site-header">
    <nav class="main-nav">
        <a href="{% url 'home' %}" class="brand">
            <i class="fa-solid fa-ticket brand-icon"></i>
            <span class="brand-text">TopEventNite</span>
        </a>

        <form class="nav-search" action="{% url 'event_list' %}" method="get">
            <input
                type="text"
                name="q"
                placeholder="Search Events..."
                aria-label="Search events"
            >
        </form>

        <div class="nav-links">
            <a href="{% url 'home' %}">Home</a>

            {% if user.is_authenticated %}
                <a href="{% url 'event_list' %}">Events</a>

                {% if user_role == "attendee" %}
                    <a href="{% url 'my_bookings' %}">My Bookings</a>
                {% elif user_role == "organiser" %}
                    <a href="{% url 'create_event' %}">Create Event</a>
                {% endif %}

                <a href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a href="#">About</a>
                <a href="{% url 'login' %}">Login/Register</a>
            {% endif %}
        </div>
    </nav>
</header>
